<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="auth.loginTitle">Sign In</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
    <script>
        (function () {
            try {
                const s = localStorage.getItem('gameSettings');
                document.documentElement.setAttribute('data-font-size',
                    s ? (JSON.parse(s).fontSize || 'medium') : 'medium');
            } catch (_) {}
        })();
    </script>
    <script src="scripts/i18n.js"></script>
</head>
<body class="stats-page login-page">

    <div class="menu-bg-wrap" aria-hidden="true">
        <div class="menu-bg-layer menu-bg-a"></div>
        <div class="menu-bg-layer menu-bg-b"></div>
    </div>

    <header class="stats-header">
        <a id="back-btn" href="index.html" class="stats-back-btn" data-i18n-aria="stats.backAriaLabel">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </a>
        <h1 class="stats-page-title" data-i18n="auth.loginTitle">Sign In</h1>
        <div class="lang-selector stats-lang-selector" aria-label="Language">
            <button class="lang-btn" aria-haspopup="listbox" data-i18n-aria="langSelector.label">
                <img class="lang-flag-current" src="assets/flags/ITA_landscape.svg" alt="">
                <span class="lang-code-current">IT</span>
                <svg class="lang-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <ul class="lang-dropdown" role="listbox">
                <li class="lang-option" data-lang="it" role="option" aria-selected="false">
                    <img class="lang-flag-opt" src="assets/flags/ITA_landscape.svg" alt=""> <span>Italiano</span>
                </li>
                <li class="lang-option" data-lang="en" role="option" aria-selected="false">
                    <img class="lang-flag-opt" src="assets/flags/UK_landscape.svg" alt=""> <span>English</span>
                </li>
            </ul>
        </div>
    </header>

    <main class="stats-main login-main">
        <div class="login-card" id="login-card">
            <div class="login-loading">
                <span class="lb-spinner"></span>
            </div>
        </div>
        <p class="login-privacy-link">
            <a href="privacy.html?ref=login" data-i18n="privacy.title">Privacy Policy</a>
        </p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="scripts/supabase-config.js" onerror="console.info('[SupabaseClient] config not found')"></script>
    <script src="scripts/supabase-client.js"></script>

    <script>
    (function () {
        'use strict';

        function t(key) { return window.i18n ? window.i18n.t(key) : key; }
        function esc(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        const ref = new URLSearchParams(location.search).get('ref');
        const card = document.getElementById('login-card');
        const backBtn = document.getElementById('back-btn');

        if (ref === 'stats') backBtn.href = 'stats.html#global';
        else if (ref === 'game') backBtn.href = 'game.html';
        else if (ref === 'menu') backBtn.href = 'index.html';

        function getAccountHref() {
            if (ref === 'stats' || ref === 'game' || ref === 'menu') {
                return 'account.html?ref=' + encodeURIComponent(ref);
            }
            return 'account.html';
        }

        function redirectToAccount() {
            window.location.href = getAccountHref();
        }

        function renderSignIn() {
            card.innerHTML = `
                <div class="login-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>
                <h2 class="login-title" data-i18n="auth.loginTitle">${esc(t('auth.loginTitle'))}</h2>
                <p class="login-subtitle" data-i18n="auth.loginSubtitle">${esc(t('auth.loginSubtitle'))}</p>
                <div class="login-form">
                    <input type="email" id="login-email" class="lb-input login-input"
                        placeholder="${esc(t('auth.emailPlaceholder'))}" autocomplete="email">
                    <button class="lb-btn lb-btn-primary login-btn" id="btn-send-link"
                        data-i18n="auth.sendMagicLink">${esc(t('auth.sendMagicLink'))}</button>
                    <span class="login-error" id="login-error"></span>
                </div>`;

            document.getElementById('btn-send-link').addEventListener('click', handleSendLink);
            document.getElementById('login-email').addEventListener('keydown', e => {
                if (e.key === 'Enter') handleSendLink();
            });
        }

        function renderLinkSent(email) {
            card.innerHTML = `
                <div class="login-icon login-icon--success">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                </div>
                <h2 class="login-title">${esc(t('auth.linkSentTitle'))}</h2>
                <p class="login-subtitle">${esc(t('auth.linkSentDesc'))}</p>
                <p class="login-email-badge">${esc(email)}</p>`;
        }

        function renderNotConfigured() {
            card.innerHTML = `
                <div class="login-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </div>
                <h2 class="login-title">Supabase not configured</h2>
                <p class="login-subtitle">See <code>supabase_config.txt</code> to enable accounts.</p>`;
        }

        async function handleSendLink() {
            const input = document.getElementById('login-email');
            const errEl = document.getElementById('login-error');
            if (!input || !input.value.trim()) return;

            const btn = document.getElementById('btn-send-link');
            btn.disabled = true;
            btn.textContent = t('auth.sending');
            errEl.textContent = '';

            const { error, message } = await window.SupabaseClient.signInWithMagicLink(input.value.trim());
            if (error) {
                btn.disabled = false;
                btn.textContent = t('auth.sendMagicLink');
                errEl.textContent = message || t('auth.magicLinkGenericError');
                return;
            }

            renderLinkSent(input.value.trim());
        }

        async function init() {
            if (!window.SupabaseClient || !window.SupabaseClient.isConfigured()) {
                renderNotConfigured();
                return;
            }

            const currentUser = await window.SupabaseClient.getCurrentUser();
            if (currentUser) {
                redirectToAccount();
                return;
            }

            renderSignIn();

            window.SupabaseClient.onAuthStateChange((event) => {
                if (event === 'SIGNED_IN') {
                    redirectToAccount();
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const imgs = ['assets/backgrounds/bg1.jpg','assets/backgrounds/bg2.jpeg',
                          'assets/backgrounds/bg3.jpg','assets/backgrounds/bg4.jpg',
                          'assets/backgrounds/bg5.jpg','assets/backgrounds/bg6.jpg'];
            const layers = [document.querySelector('.menu-bg-a'), document.querySelector('.menu-bg-b')];
            let cur = 0;
            let active = 0;
            layers[0].style.backgroundImage = `url('${imgs[0]}')`;
            layers[0].style.opacity = '1';
            layers[1].style.opacity = '0';
            setInterval(() => {
                cur = (cur + 1) % imgs.length;
                const next = 1 - active;
                layers[next].style.backgroundImage = `url('${imgs[cur]}')`;
                layers[next].style.opacity = '1';
                layers[active].style.opacity = '0';
                active = next;
            }, 5000);
        });

        window.i18nReady.then(init);
    })();
    </script>

</body>
</html>
